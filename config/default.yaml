assistant:
  compact_keep_recent: 6
  compact_threshold: 25
  max_context_messages: 50
  max_tool_iterations: 25
  name: ACM
  response_timeout: 120
  system_prompt: 'You are ACM, an advanced autonomous AI agent integrated into the
    local operating system.

    You have access to Tier-1 tools that allow you to execute complex tasks:


    1. **Execution & Vision**: You can execute commands, read/write files, and take
    screenshots to see the user''s screen.

    2. **Browser Agent**: You can control a headless Chromium browser. Use `browser_agent`
    to navigate URLs, click elements, fill forms, and extract data. The browser persists
    between commands, enabling multi-step navigation.

    3. **Python Kernel (Jupyter)**: You have a live Python environment. Use `run_python`
    to execute complex code. Variables persist in memory. You can generate plots (with
    matplotlib) and images will be sent automatically to the chat!

    4. **Long-Term Memory (RAG)**: You have persistent vector memory. If asked to
    remember something for later, use `remember_note`. If you need past context, use
    `search_memory`.

    5. **File Transfer**: If you generate a physical file for the user (PDF, Excel,
    Word, CSV, etc.), you MUST send it back to the chat. Use the `send_file_to_chat`
    tool to get a link and send that link to the user.


    Respond clearly and directly. You are an autonomous system: instead of telling
    the user HOW to do something, use your tools and DO IT yourself.

    Always return the `/api/media/...` links that your tools provide so the user can
    view images or download files.

    '
channels:
  discord:
    command_prefix: '!'
    enabled: false
    respond_to_dms: true
    respond_to_mentions: true
  telegram:
    allowed_users: []
    enabled: false
  whatsapp:
    bridge_url: http://localhost:3001
    enabled: false
    rate_limit_per_minute: 20
llm:
  default_provider: opencode_go
  providers:
    anthropic:
      default_model: claude-sonnet-4-20250514
    gemini:
      default_model: gemini-2.5-flash
    ollama:
      base_url: http://localhost:11434
      default_model: llama3.2
    openai:
      default_model: gpt-4o
    opencode_go:
      base_url: https://opencode.ai/zen/go/v1
      default_model: kimi-k2.5
    openrouter:
      base_url: https://openrouter.ai/api/v1
      default_model: openrouter/auto
    xai:
      base_url: https://api.x.ai/v1
      default_model: grok-4.20-0309-non-reasoning
  timeout: 0
local_router:
  confidence_threshold: 0.88
  enabled: true
  observation_mode: false
security:
  blocked_paths:
  - C:\Windows\System32
  - /etc/shadow
  - /etc/passwd
  - config/
  - data/openacm.db
  - data/vectordb
  - data/logs
  blocked_patterns:
  - rm -rf /
  - del /f /s /q C:\
  - format
  - ':(){:|:&};:'
  - mkfs
  - dd if=/dev
  - shutdown
  - reboot
  - halt
  - init 0
  - init 6
  execution_mode: confirmation
  max_command_timeout: 0
  max_output_length: 50000
  whitelisted_commands:
  - ls
  - dir
  - cat
  - type
  - echo
  - ping
  - systeminfo
  - whoami
  - hostname
  - ipconfig
  - ifconfig
  - uname
  - pwd
  - date
  - uptime
  - df
  - free
  - top
  - ps
  - netstat
  - curl
  - wget
  - python
  - pip
  - git
  - npm
  - node
storage:
  database_path: data/openacm.db
  log_conversations: true
  log_tool_executions: true
web:
  auth_enabled: true
  host: 127.0.0.1
  port: 47821
