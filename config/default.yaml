###############################################
# OpenACM - Default Configuration
###############################################

assistant:
  name: "ACM"
  system_prompt: |
    You are ACM, an advanced autonomous AI agent integrated into the local operating system.
    You have access to Tier-1 tools that allow you to execute complex tasks:

    1. **Execution & Vision**: You can execute commands, read/write files, and take screenshots to see the user's screen.
    2. **Browser Agent**: You can control a headless Chromium browser. Use `browser_agent` to navigate URLs, click elements, fill forms, and extract data. The browser persists between commands, enabling multi-step navigation.
    3. **Python Kernel (Jupyter)**: You have a live Python environment. Use `run_python` to execute complex code. Variables persist in memory. You can generate plots (with matplotlib) and images will be sent automatically to the chat!
    4. **Long-Term Memory (RAG)**: You have persistent vector memory. If asked to remember something for later, use `remember_note`. If you need past context, use `search_memory`.
    5. **File Transfer**: If you generate a physical file for the user (PDF, Excel, Word, CSV, etc.), you MUST send it back to the chat. Use the `send_file_to_chat` tool to get a link and send that link to the user.

    Respond clearly and directly. You are an autonomous system: instead of telling the user HOW to do something, use your tools and DO IT yourself.
    Always return the `/api/media/...` links that your tools provide so the user can view images or download files.
  max_context_messages: 50
  max_tool_iterations: 25
  response_timeout: 120

llm:
  default_provider: "opencode_go"
  providers:
    ollama:
      base_url: "http://localhost:11434"
      default_model: "llama3.2"
    openai:
      default_model: "gpt-4o"
    anthropic:
      default_model: "claude-sonnet-4-20250514"
    gemini:
      default_model: "gemini/gemini-2.0-flash"
    opencode_go:
      default_model: "kimi-k2.5"
      base_url: "https://opencode.ai/zen/go/v1"
      # OpenCode Go models (OpenAI-compatible):
      #   GLM-4-Flash
      #   Kimi-K2.5
      #   MiniMax-M2.5
      # Use with your API key (OPENCODE_GO_API_KEY in .env)
    openrouter:
      default_model: "openrouter/auto"
      base_url: "https://openrouter.ai/api/v1"

security:
  execution_mode: "confirmation"  # confirmation | auto | yolo
  whitelisted_commands:
    - "ls"
    - "dir"
    - "cat"
    - "type"
    - "echo"
    - "ping"
    - "systeminfo"
    - "whoami"
    - "hostname"
    - "ipconfig"
    - "ifconfig"
    - "uname"
    - "pwd"
    - "date"
    - "uptime"
    - "df"
    - "free"
    - "top"
    - "ps"
    - "netstat"
    - "curl"
    - "wget"
    - "python"
    - "pip"
    - "git"
    - "npm"
    - "node"
  blocked_patterns:
    - "rm -rf /"
    - "del /f /s /q C:\\"
    - "format"
    - ":(){:|:&};:"
    - "mkfs"
    - "dd if=/dev"
    - "shutdown"
    - "reboot"
    - "halt"
    - "init 0"
    - "init 6"
  blocked_paths:
    - "C:\\Windows\\System32"
    - "/etc/shadow"
    - "/etc/passwd"
  max_command_timeout: 60
  max_output_length: 50000

web:
  host: "127.0.0.1"
  port: 8080
  auth_enabled: true

channels:
  discord:
    enabled: false
    command_prefix: "!"
    respond_to_mentions: true
    respond_to_dms: true
  telegram:
    enabled: false
    allowed_users: []  # empty = all users
  whatsapp:
    enabled: false
    bridge_url: "http://localhost:3001"
    rate_limit_per_minute: 20

storage:
  database_path: "data/openacm.db"
  log_conversations: true
  log_tool_executions: true
